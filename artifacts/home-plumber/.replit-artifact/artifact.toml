kind = "web"
previewPath = "/"
title = "Home Plumber"
version = "1.0.0"
id = "artifacts/home-plumber"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18194

[services.development]
run = "pnpm --filter @workspace/home-plumber run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/home-plumber", "run", "build" ]
publicDir = "artifacts/home-plumber/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18194"
BASE_PATH = "/"
